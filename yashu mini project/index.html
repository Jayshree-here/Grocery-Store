<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<title>My Store</title> 
<link rel="stylesheet" href="style.css"> 
</head> 
<body> 
<div id="loginPage" class="page active"> 
  <div class="card"> 
    <h2>Login</h2> 
    <input type="text" id="username" placeholder="Enter Username"> 
    <input type="password" id="password" placeholder="Enter Password"> 
    <button onclick="login()">Login</button> 
  </div> 
</div> 
<div id="homePage" class="page"> 
  <header> 
    <h1>My Store</h1> 
    <div> 
      <button onclick="goToCart()">Cart 🛒</button> 
      <button onclick="logout()">Logout 🚪</button> 
    </div> 
  </header> 
  <input type="text" id="search" placeholder="Search products..."> 
  <div id="products"></div> 
</div> 
<div id="cartPage" class="page"> 
  <h2>Your Cart</h2> 
  <ul id="cart"></ul> 
  <h3>Total: ₹<span id="total">0</span></h3> 
  <button onclick="goToAddress()">Place Order</button> 
  <button onclick="showPage('homePage')">Back to Home</button> 
</div> 
<div id="addressPage" class="page"> 
  <div class="card"> 
    <h2>Delivery Address</h2> 
    <input type="text" id="name" placeholder="Full Name"> 
    <input type="text" id="address" placeholder="Address"> 
    <input type="text" id="city" placeholder="City"> 
    <input type="text" id="pincode" placeholder="Pincode"> 
    <button onclick="goToPayment()">Continue</button> 
    <button onclick="showPage('cartPage')">Back</button> 
  </div> 
</div> 
<div id="paymentPage" class="page"> 
  <div class="card"> 
    <h2>Payment</h2> 
    <select id="paymentMethod"> 
      <option>UPI</option> 
      <option>Credit Card</option> 
      <option>Cash on Delivery</option> 
    </select> 
    <button onclick="placeOrder()">Pay Now</button> 
    <button onclick="showPage('addressPage')">Back</button> 
  </div> 
</div> 
<script src="script.js"></script> 
</body> 
</html>
